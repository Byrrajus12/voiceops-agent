name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      rollback_to:
        description: "Last known good commit SHA to deploy (the commit BEFORE the bad one)"
        required: true
        type: string
      incident_id:
        description: "Dynatrace incident/problem ID"
        required: true
        type: string
      triggered_by:
        description: "What triggered this rollback"
        required: false
        default: "manual"
        type: string

env:
  PROJECT_ID: sreagnt
  REGION: us-central1
  SERVICE: voiceops-target

jobs:
  rollback:
    name: Execute Rollback
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.rollback_to }}
          fetch-depth: 0

      - name: Display rollback context
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ROLLBACK INITIATED"
          echo "  Target SHA   : ${{ inputs.rollback_to }}"
          echo "  Incident ID  : ${{ inputs.incident_id }}"
          echo "  Triggered by : ${{ inputs.triggered_by }}"
          echo "  Timestamp    : $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          git log --oneline -1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push image
        run: |
          IMAGE="gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ inputs.rollback_to }}"
          docker build ./target-service --tag "$IMAGE"
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (BROKEN=false)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --set-env-vars "BROKEN=false,DYNATRACE_PLATFORM_TOKEN=${{ secrets.DYNATRACE_PLATFORM_TOKEN }}" \
            --quiet

      - name: Health check rolled-back service
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format 'value(status.url)')
          sleep 5

          echo "--- /health ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "✗ /health returned HTTP $STATUS"
            exit 1
          fi
          echo "✓ /health OK"

          echo "--- /voice-agent/session/start ---"
          SESSION_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$URL/voice-agent/session/start" \
            -H "Content-Type: application/json" \
            -d '{"session_id":"rollback-verify","metadata":{"source":"rollback-health-check"}}')
          if [ "$SESSION_STATUS" != "200" ]; then
            echo "✗ session/start returned HTTP $SESSION_STATUS — rollback did NOT fix the service"
            exit 1
          fi
          echo "✓ session/start OK"
          echo "✓ Rollback verified — both endpoints healthy"

      - name: Summary
        run: |
          echo ""
          echo "✅ Rollback to ${{ inputs.rollback_to }} deployed and verified healthy."
          echo "   Incident ${{ inputs.incident_id }} should now be resolving in Dynatrace."
